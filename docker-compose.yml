services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "uv run python manage.py migrate --noinput &&
             uv run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/airdrop_works
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_ENV=local
      - SPORE_NEO4J_ENABLED=${SPORE_NEO4J_ENABLED:-false}
      - SPORE_NEO4J_URI=${SPORE_NEO4J_URI:-bolt://neo4j:7687}
      - SPORE_NEO4J_USER=${SPORE_NEO4J_USER:-neo4j}
      - SPORE_NEO4J_PASSWORD=${SPORE_NEO4J_PASSWORD:-spore-neo4j-dev-password}
      - SPORE_NEO4J_DATABASE=${SPORE_NEO4J_DATABASE:-neo4j}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: airdrop_works
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${SPORE_NEO4J_PASSWORD:-spore-neo4j-dev-password}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/airdrop_works
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_ENV=local
      - SPORE_NEO4J_ENABLED=${SPORE_NEO4J_ENABLED:-false}
      - SPORE_NEO4J_URI=${SPORE_NEO4J_URI:-bolt://neo4j:7687}
      - SPORE_NEO4J_USER=${SPORE_NEO4J_USER:-neo4j}
      - SPORE_NEO4J_PASSWORD=${SPORE_NEO4J_PASSWORD:-spore-neo4j-dev-password}
      - SPORE_NEO4J_DATABASE=${SPORE_NEO4J_DATABASE:-neo4j}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/airdrop_works
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_ENV=local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  neo4j_data:
