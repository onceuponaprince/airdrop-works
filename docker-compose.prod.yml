services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://airdrop.works}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_PROJECT_ID: ${NEXT_PUBLIC_PROJECT_ID:-}
        NEXT_PUBLIC_CLIENT_KEY: ${NEXT_PUBLIC_CLIENT_KEY:-}
        NEXT_PUBLIC_APP_ID: ${NEXT_PUBLIC_APP_ID:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    environment:
      - BACKEND_URL=${BACKEND_URL:-https://unstemmed-martine-renowned.ngrok-free.dev}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    restart: unless-stopped

  backend:
    command:
      - sh
      - -c
      - |
        uv run python manage.py collectstatic --noinput && \
        uv run python manage.py migrate --noinput && \
        uv run gunicorn config.wsgi:application \
          --bind 0.0.0.0:8000 \
          --workers $${GUNICORN_WORKERS:-3} \
          --timeout 120 \
          --access-logfile - \
          --error-logfile -
    volumes: []
    env_file:
      - ./backend/.env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_ENV=production
    restart: unless-stopped

  db:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: []

  redis:
    ports: []

  celery:
    env_file:
      - ./backend/.env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_ENV=production
    volumes: []
    restart: unless-stopped

  celery-beat:
    env_file:
      - ./backend/.env.production
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_ENV=production
    volumes: []
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    # HTTP-only config: no TLS certs required (see nginx/nginx.conf + mount nginx/ssl/ for HTTPS).
    # Publish 443 only when using TLS config and certificates.
    ports:
      - "${NGINX_HOST_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.docker.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
