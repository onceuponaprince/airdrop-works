services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://airdrop.works}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID: ${NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID:-}
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    environment:
      - BACKEND_URL=${BACKEND_URL:-https://unstemmed-martine-renowned.ngrok-free.dev}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
    restart: unless-stopped

  backend:
    command: >
      sh -c "uv run python manage.py collectstatic --noinput &&
             uv run python manage.py migrate --noinput &&
             uv run gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers ${GUNICORN_WORKERS:-3}
             --timeout 120
             --access-logfile -
             --error-logfile -"
    volumes: []
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    restart: unless-stopped

  db:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: []

  redis:
    ports: []

  celery:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes: []
    restart: unless-stopped

  celery-beat:
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes: []
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
